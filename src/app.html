<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1"
    />
    <meta
      name="description"
      content="Movie Log — a personal cinema journal by a.kurosawa"
    />
    <link
      rel="preload"
      href="%sveltekit.assets%/fonts/Hubano-Rough.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <script>
      if (localStorage.getItem('user-color-scheme') !== null) {
        document.documentElement.setAttribute(
          'data-user-color-scheme',
          localStorage.getItem('user-color-scheme')
        );
      }
    </script>
    %sveltekit.head%
  </head>
  <body class="no-js" data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
